name: Feature CI

on:
  pull_request:
    branches:
      - develop

jobs:
  feature_ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install FVM (version 3.2.1)
        run: dart pub global activate fvm 3.2.1

      - name: Check FVM version
        run: fvm --version

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache entire FVM directory
        uses: actions/cache@v3
        with:
          path: .fvm
          key: ${{ runner.os }}-fvm-${{ hashFiles('.fvmrc') }}
          restore-keys: ${{ runner.os }}-fvm-

      - name: Check cache and Flutter SDK status
        run: |
          echo "Checking if pub cache exists:"
          if [ -d "$HOME/.pub-cache" ]; then
            echo "Pub cache directory exists"
          else
            echo "Pub cache directory NOT found"
          fi
          echo "Checking if .fvm directory exists:"
          if [ -d ".fvm" ]; then
            echo ".fvm directory exists"
          else
            echo ".fvm directory NOT found"
          fi
          echo "Flutter SDK version via fvm:"
          fvm flutter --version

      - name: Install Flutter SDK via FVM
        run: fvm install

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Format check
        run: fvm dart format --set-exit-if-changed .

      - name: Analyze code
        run: fvm flutter analyze
