name: Release Publisher

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 가져오기 (changelog 생성용)

      - name: Get version from tag
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # CHANGELOG.md에서 해당 버전 섹션 추출
          if grep -q "\[$VERSION\]" CHANGELOG.md; then
            # 버전 섹션 시작부터 다음 버전까지 추출
            NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_NOTES=버전 $VERSION의 변경사항입니다." >> $GITHUB_OUTPUT
          fi

      - name: Get previous tag
        id: previous_tag
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "${{ steps.get_version.outputs.TAG_NAME }}" | tail -1)
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Generate commit list
        id: commits
        run: |
          if [ -n "${{ steps.previous_tag.outputs.PREVIOUS_TAG }}" ]; then
            COMMITS=$(git log --oneline ${{ steps.previous_tag.outputs.PREVIOUS_TAG }}..${{ steps.get_version.outputs.TAG_NAME }})
          else
            COMMITS=$(git log --oneline ${{ steps.get_version.outputs.TAG_NAME }})
          fi

          echo "COMMIT_LIST<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          release_name: Release ${{ steps.get_version.outputs.TAG_NAME }}
          body: |
            # 🎉 Release ${{ steps.get_version.outputs.TAG_NAME }}

            ## 📋 변경사항

            ${{ steps.changelog.outputs.RELEASE_NOTES }}

            ---

            ## 📝 커밋 목록

            <details>
            <summary>커밋 상세보기</summary>

            ```
            ${{ steps.commits.outputs.COMMIT_LIST }}
            ```

            </details>

            ---

            **전체 변경 이력**: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/develop/CHANGELOG.md)
          draft: false
          prerelease: false
