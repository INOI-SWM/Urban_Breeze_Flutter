name: Release CI

on:
  pull_request:
    branches:
      - "release/**"
      - main
      - master

jobs:
  release_validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Determine Flutter version from .fvmrc
        uses: kuhnroyal/flutter-fvm-config-action/config@v3
        id: fvm-config

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Check CHANGELOG updated
        run: |
          if ! git diff origin/develop -- CHANGELOG.md | grep -q "^+"; then
            echo "⚠️  Warning: CHANGELOG.md가 업데이트되지 않았습니다."
            echo "Release 전 CHANGELOG.md를 업데이트해주세요."
            exit 1
          fi

      - name: Validate version in pubspec.yaml
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "📦 Current version: $VERSION"

          # 버전 형식 검증 (Major.Minor.Patch+Build)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$'; then
            echo "❌ 잘못된 버전 형식입니다: $VERSION"
            echo "올바른 형식: Major.Minor.Patch+Build (예: 1.0.0+5)"
            exit 1
          fi

          echo "✅ 버전 형식이 올바릅니다."
