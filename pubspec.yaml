name: ridingmate
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  flutter_map: ^8.1.1
  geolocator: ^14.0.1
  flutter_dotenv: ^5.2.1
  latlong2: ^0.9.1
  http: ^1.4.0
  flutter_polyline_points: ^2.1.0
  share_plus: ^11.0.0
  path_provider: ^2.1.5
  google_polyline_algorithm: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard JP
      fonts:
        - asset: assets/fonts/PretendardJP-Regular.ttf
        - asset: assets/fonts/PretendardJP-Medium.ttf
          weight: 500
        - asset: assets/fonts/PretendardJP-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PretendardJP-Bold.ttf
          weight: 700

  assets:
    - assets/icons/svg/
    - assets/images/png/
    - .env
    - assets/icons/png/
