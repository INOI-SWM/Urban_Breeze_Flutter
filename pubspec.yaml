name: urban_breeze
description: "A new Flutter project."
publish_to: "none"
version: 1.0.2+8

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  flutter_map: ^8.1.1
  geolocator: ^14.0.1
  flutter_dotenv: ^5.2.1
  latlong2: ^0.9.1
  http: ^1.4.0
  http_parser: ^4.1.2
  flutter_polyline_points: ^2.1.0
  share_plus: ^12.0.0
  path_provider: ^2.1.5
  google_polyline_algorithm: ^3.1.0
  gpx: ^2.3.0
  google_sign_in: ^6.3.0
  flutter_riverpod: ^2.6.1
  sign_in_with_apple: ^7.0.1
  kakao_flutter_sdk_user: ^1.9.7+3
  shared_preferences: ^2.4.1
  health_kit_reporter: ^2.3.1
  fl_chart: ^1.0.0
  image_picker: ^1.1.2
  crypto: ^3.0.5
  flutter_secure_storage: ^9.2.4
  firebase_core: ^4.0.0
  firebase_crashlytics: ^5.0.0
  terra_flutter_bridge: ^0.8.0
  amplitude_flutter: ^4.3.7
  app_tracking_transparency: ^2.0.6+1
  webview_flutter: ^4.13.0
  app_links: ^6.3.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  vector_math: 2.2.0

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard JP
      fonts:
        - asset: assets/fonts/PretendardJP-Regular.ttf
        - asset: assets/fonts/PretendardJP-Medium.ttf
          weight: 500
        - asset: assets/fonts/PretendardJP-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PretendardJP-Bold.ttf
          weight: 700

  assets:
    - assets/icons/svg/
    - assets/icons/png/
    - assets/images/png/
    - .env.dev
    - .env.prod

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/png/urban_breeze_app_logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
