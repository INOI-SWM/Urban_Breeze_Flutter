commit-msg:
  scripts:
    validate_commit_msg:
      runner: bash
      script: .lefthook/validate-commit-msg.sh "{{.CommitMsgFile}}"

pre-push:
  parallel: false
  scripts:
    validate_branch_name:
      runner: bash
      script: .lefthook/validate-branch-name.sh

    dart_fix:
      runner: bash
      script: dart fix --apply

    flutter_analyze:
      runner: bash
      script: flutter analyze
