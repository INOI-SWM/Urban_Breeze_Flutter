commit-msg:
  parallel: true
  commands:
    validate-commit-msg:
      run: .lefthook/validate-commit-msg.sh {1}

pre-commit:
  scripts:
    dart_fix:
      runner: bash
      script: dart fix --apply

pre-push:
  parallel: true
  scripts:
    validate_branch_name:
      runner: bash
      script: .lefthook/validate-branch-name.sh
    flutter_analyze:
      runner: bash
      script: |
        flutter analyze || { echo "❌ Flutter analyze 에러로 push 중단됨"; exit 1; }
