commit-msg:
  parallel: true
  commands:
    validate-commit-msg:
      run: .lefthook/validate-commit-msg.sh {1}

pre-commit:
  parallel: true
  commands:
    dart_fix:
      run: dart fix --apply
    dart_format:
      run: dart format .

pre-push:
  parallel: true
  commands:
    validate-branch-name:
      run: .lefthook/validate-branch-name.sh
    flutter-analyze:
      run: .lefthook/flutter-analyze.sh
    dart-format-check:
      run: .lefthook/dart-format-check.sh
