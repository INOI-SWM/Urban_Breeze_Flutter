commit-msg:
  parallel: true
  commands:
    validate-commit-msg:
      run: .lefthook/validate-commit-msg.sh {1}

pre-commit:
  scripts:
    dart_fix:
      runner: bash
      script: dart fix --apply

pre-push:
  parallel: true
  commands:
    validate-branch-name:
      run: .lefthook/validate-branch-name.sh
    flutter-analyze:
      run: flutter analyze || { echo "❌ Flutter analyze 에러로 push 중단됨"; exit 1; }
